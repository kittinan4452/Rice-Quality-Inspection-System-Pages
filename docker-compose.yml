services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: rice-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rice_data}
      MYSQL_USER: ${MYSQL_USER:-rice_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rice_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u rice_user -p$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - rice-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rice-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./myapp/static:/app/myapp/static
      - ./myapp/weights:/app/myapp/weights  # Mount ML weights
      - backend_uploads:/app/myapp/static/upload
      - backend_images:/app/myapp/static/images
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE:-rice_data}
      - DB_USER=${MYSQL_USER:-rice_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-rice_password}
      - ALLOWED_HOSTS=localhost,backend,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rice-network
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://192.168.1.126:8000}
    container_name: rice-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://192.168.1.126:8000}
    depends_on:
      - backend
    networks:
      - rice-network

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local
  backend_images:
    driver: local

networks:
  rice-network:
    driver: bridge
